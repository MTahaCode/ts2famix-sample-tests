name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the unified repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install ts2famix globally
      - name: Install ts2famix
        run: npm install -g ts2famix

      # 4. Generate the model.json from your src/ folder
      - name: Generate Model JSON
        run: |
          mkdir -p JSONModels
          ts2famix -i src -o JSONModels/model.json

      # # 5. Set up smalltalk-ci and run the tests using Moose 12
      # - name: Run Pharo/Moose Tests
      #   uses: hpi-swa-lab/smalltalkCI@v1
      #   with:
      #     smalltalk-image: 'Moose64-12' # Targets Moose 12 (built on Pharo 12)

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: famix-model-json
          path: JSONModels/model.json
          retention-days: 5